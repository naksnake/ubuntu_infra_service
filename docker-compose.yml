services:

  # ── Web file server (iPXE scripts + ISO/kernel share) ──────────────────────
  webfs:
    build: ./services/webfs
    container_name: sit_webfs
    ports:
      - "${WEBFS_PORT:-8080}:8080"
    volumes:
      - ./services/webfs/htdocs:/var/www/htdocs:rw
      - ./ipxe:/var/www/htdocs/ipxe:ro
      - ./data/webfs_share:/var/www/htdocs/files:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/files/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── TFTP server (bootloader delivery) ──────────────────────────────────────
  tftp:
    build: ./services/tftp
    container_name: sit_tftp
    network_mode: host
    volumes:
      - ./services/tftp/tftpboot:/srv/tftp:rw
    healthcheck:
      test: ["CMD-SHELL", "ls /srv/tftp >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── DHCP + PXE (dnsmasq, host network required) ────────────────────────────
  dhcp:
    build: ./services/dhcp
    container_name: sit_dhcp
    network_mode: host
    environment:
      - PXE_IFACE=${PXE_IFACE}
      - PXE_RANGE_START=${PXE_RANGE_START}
      - PXE_RANGE_END=${PXE_RANGE_END}
      - PXE_NETMASK=${PXE_NETMASK}
      - PXE_ROUTER_IP=${PXE_ROUTER_IP}
      - DNS_SERVER=${DNS_SERVER}
      - WEBFS_HOST_IP=${WEBFS_HOST_IP}
      - WEBFS_PORT=${WEBFS_PORT:-8080}
      - TFTP_SERVER_IP=${TFTP_SERVER_IP}
      - ISO_FILE=${ISO_FILE:-}
    volumes:
      - ./services/dhcp/dnsmasq.conf.template:/etc/dnsmasq.conf.template:ro
      - ./services/tftp/tftpboot:/srv/tftp:ro
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $(cat /var/run/dnsmasq.pid 2>/dev/null) 2>/dev/null || pgrep dnsmasq >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── AWX: PostgreSQL database ────────────────────────────────────────────────
  awx-postgres:
    image: postgres:15-alpine
    container_name: sit_awx_postgres
    environment:
      POSTGRES_USER: awx
      POSTGRES_PASSWORD: ${AWX_DB_PASSWORD}
      POSTGRES_DB: awx
    volumes:
      - ./data/awx_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awx -d awx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── AWX: Redis (channel layers + cache) ────────────────────────────────────
  awx-redis:
    image: redis:7-alpine
    container_name: sit_awx_redis
    command: redis-server --save "" --appendonly no --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── AWX: Web (nginx + daphne, runs migrations + creates admin) ─────────────
  awx-web:
    image: ghcr.io/ansible/awx:${AWX_VERSION:-23.9.0}
    container_name: sit_awx_web
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
    ports:
      - "${AWX_HTTP_PORT:-8052}:8052"
    hostname: awxweb
    user: root
    environment:
      AWX_COMPONENT: web
      SECRET_KEY: ${AWX_SECRET_KEY}
      DJANGO_SUPERUSER_USERNAME: ${AWX_ADMIN_USER:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${AWX_ADMIN_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: admin@lab.local
    volumes:
      - ./services/awx/credentials.py:/etc/tower/conf.d/credentials.py:ro
      - ./data/awx_projects:/var/lib/awx/projects:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8052/api/v2/ping/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── AWX: Task worker (Ansible dispatcher + receptor) ──────────────────────
  awx-task:
    image: ghcr.io/ansible/awx:${AWX_VERSION:-23.9.0}
    container_name: sit_awx_task
    depends_on:
      awx-postgres:
        condition: service_healthy
      awx-redis:
        condition: service_healthy
      awx-web:
        condition: service_started
    hostname: awx
    user: root
    environment:
      AWX_COMPONENT: task
      SECRET_KEY: ${AWX_SECRET_KEY}
      AWX_SKIP_MIGRATIONS: "1"
    volumes:
      - ./services/awx/credentials.py:/etc/tower/conf.d/credentials.py:ro
      - ./data/awx_projects:/var/lib/awx/projects:rw
    restart: unless-stopped
