services:

  # ── Web file server (iPXE scripts + ISO/kernel share) ──────────────────────
  webfs:
    build: ./services/webfs
    container_name: lab_webfs
    ports:
      - "${WEBFS_PORT:-8080}:8080"
    volumes:
      # webfsd only serves files; mount everything read-only so a compromised
      # file server cannot tamper with boot assets (uploads are written by the
      # iPXE Manager through its own rw mount of the same directory).
      - ./services/webfs/htdocs:/var/www/htdocs:ro
      - ./ipxe:/var/www/htdocs/ipxe:ro
      - ./data/webfs_share:/var/www/htdocs/files:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/files/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── TFTP server (bootloader delivery) ──────────────────────────────────────
  tftp:
    build: ./services/tftp
    container_name: lab_tftp
    network_mode: host
    volumes:
      - ./services/tftp/tftpboot:/srv/tftp:rw
    healthcheck:
      # check the daemon is actually running, not merely that the dir exists
      test: ["CMD-SHELL", "pgrep in.tftpd >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── DHCP + PXE (dnsmasq, host network required) ────────────────────────────
  dhcp:
    build: ./services/dhcp
    container_name: lab_dhcp
    network_mode: host
    environment:
      - PXE_IFACE=${PXE_IFACE}
      - PXE_RANGE_START=${PXE_RANGE_START}
      - PXE_RANGE_END=${PXE_RANGE_END}
      - PXE_NETMASK=${PXE_NETMASK}
      - PXE_ROUTER_IP=${PXE_ROUTER_IP}
      - DNS_SERVER=${DNS_SERVER}
      - WEBFS_HOST_IP=${WEBFS_HOST_IP}
      - WEBFS_PORT=${WEBFS_PORT:-8080}
      - TFTP_SERVER_IP=${TFTP_SERVER_IP}
      - IPXE_MANAGER_PORT=${IPXE_MANAGER_PORT:-8091}
    volumes:
      - ./services/dhcp/dnsmasq.conf.template:/etc/dnsmasq.conf.template:ro
      - ./data/dnsmasq.leases:/data/dnsmasq.leases:rw
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $(cat /var/run/dnsmasq.pid 2>/dev/null) 2>/dev/null || pgrep dnsmasq >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── iPXE Manager (boot entry editor + file uploads) ───────────────────────
  ipxe-manager:
    build: ./services/ipxe_manager
    container_name: lab_ipxe_manager
    ports:
      - "${IPXE_MANAGER_PORT:-8091}:8091"
    volumes:
      - ./data/webfs_share:/data/uploads:rw
      # directory mount, NOT a single-file mount — save_entries() renames a
      # temp file over entries.json, which fails with EBUSY on a file mount
      - ./data/ipxe_manager:/data/state:rw
    environment:
      - UPLOAD_DIR=/data/uploads
      - ENTRIES_FILE=/data/state/entries.json
      - AUTOINSTALL_FILE=/data/state/autoinstall.json
      - WEBFS_BASE=http://${WEBFS_HOST_IP:-192.168.100.1}:${WEBFS_PORT:-8080}
      - SERVER_IP=${WEBFS_HOST_IP:-192.168.100.1}
      # base URL PXE clients use to fetch the autoinstall seed — must point at
      # this manager (host:published-port), which serves /autoinstall/<id>/
      - MANAGER_BASE=http://${WEBFS_HOST_IP:-192.168.100.1}:${IPXE_MANAGER_PORT:-8091}
      - AUTH_PASSWORD=${IPXE_MANAGER_PASSWORD:-}
    healthcheck:
      # /menu.ipxe stays reachable even when IPXE_MANAGER_PASSWORD is set
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/menu.ipxe')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Monitor dashboard (service health + DHCP lookup) ──────────────────────
  monitor:
    build: ./services/monitor
    container_name: lab_monitor
    ports:
      - "${MONITOR_PORT:-8090}:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/dnsmasq.leases:/data/dnsmasq.leases:ro
    environment:
      - LEASES_FILE=/data/dnsmasq.leases
      - REFRESH_INTERVAL=${MONITOR_REFRESH:-30}
      # ports for the dashboard quick-links (host-relative in the browser)
      - WEBFS_PORT=${WEBFS_PORT:-8080}
      - IPXE_MANAGER_PORT=${IPXE_MANAGER_PORT:-8091}
      - CCP_PORT=${CCP_PORT:-8060}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/api/status')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Cluster Control Panel (ClusterShell + Ansible web UI) ──────────────────
  ccp:
    build: ./services/ccp
    container_name: lab_ccp
    ports:
      - "${CCP_PORT:-8060}:8060"
    volumes:
      # single directory bind mount holds the SQLite db, job logs, uploaded
      # files and the SSH key — no single-file mounts (which Docker would
      # auto-create as directories on a bare `docker compose up`)
      - ./data/ccp:/data/ccp:rw
    environment:
      - CCP_SECRET_KEY=${CCP_SECRET_KEY}
      - CCP_ADMIN_USER=${CCP_ADMIN_USER:-admin}
      - CCP_ADMIN_PASSWORD=${CCP_ADMIN_PASSWORD}
      - CCP_DEMO=${CCP_DEMO:-0}
      - CCP_DB=/data/ccp/ccp.db
      - CCP_JOBS_DIR=/data/ccp/jobs
      - CCP_FILES_DIR=/data/ccp/files
      - CCP_SSH_KEY=/data/ccp/ssh/id_ccp
      # hard per-job wall-clock cap (seconds) so a hung command/playbook can't
      # pin a worker thread forever
      - CCP_JOB_TIMEOUT=${CCP_JOB_TIMEOUT:-900}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8060/healthz')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 8s
    restart: unless-stopped
