# Static DHCP reservations — pin a fixed IP address to a machine's MAC address.
#
# One reservation per line, same fields as dnsmasq's dhcp-host= option:
#   <mac>,<ip>[,<hostname>][,<lease time>]
#
# Rules:
# - The IP must be inside the PXE subnet (PXE_NETMASK), but keep reservations
#   OUTSIDE the dynamic pool (PXE_RANGE_START–PXE_RANGE_END) so the pool can
#   never hand the same address to another machine.
# - The optional per-host lease time overrides PXE_LEASE_TIME (e.g. 24h,
#   infinite). Omit it to use the global value.
#
# Apply changes with:  docker compose restart dhcp
# A client already online picks its reserved IP up at its next renewal
# (half the lease time at the latest) or immediately on reboot / re-plug.
#
# Examples (remove the leading # to activate):
#aa:bb:cc:dd:ee:01,192.168.100.201,node-01
#aa:bb:cc:dd:ee:02,192.168.100.202,node-02,24h
#aa:bb:cc:dd:ee:03,192.168.100.203,storage-01,infinite
